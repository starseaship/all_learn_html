<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe's Study Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Kaisei+Opti:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN: Soft macaron pastel + editorial warmth
   Airy cream base, hand-picked pastel chips, rounded & cozy
   ============================================================ */
:root {
  --bg:        #f7f4ef;
  --surface:   #ffffff;
  --surface2:  #f0ece5;

  /* macaron palette */
  --pink:      #f9c4ce;
  --pink-deep: #c4637a;
  --blue:      #b8d8f8;
  --blue-deep: #4a7fb5;
  --mint:      #b5e8c8;
  --mint-deep: #3a8f5e;
  --lav:       #d4c4f0;
  --lav-deep:  #7254b8;
  --peach:     #ffd9b8;
  --peach-deep:#c07030;
  --yellow:    #fdeea0;

  --text:      #2e2a35;
  --text-dim:  #7a7585;
  --border:    rgba(0,0,0,0.07);
  --shadow:    rgba(80,60,100,0.10);

  /* subject → color mapping */
  --c-english:  var(--blue);
  --c-japanese: var(--mint);
  --c-general:  var(--peach);
  --c-wgl:      var(--lav);

  /* type → color mapping */
  --c-grammar:    var(--pink);
  --c-vocabulary: var(--blue);
  --c-quiz:       var(--mint);
  --c-notes:      var(--peach);
  --c-reference:  var(--lav);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: auto;
  overflow-x: hidden;
}

/* ── DECORATIVE BG BLOBS ── */
body::before {
  content: '';
  position: fixed;
  top: -120px; right: -120px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(249,196,206,0.35) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px; left: -100px;
  width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(181,232,200,0.3) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative; z-index: 10;
  padding: 48px 40px 36px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: rgba(247,244,239,0.85);
  backdrop-filter: blur(8px);
}
.header-left h1 {
  font-family: 'Kaisei Opti', serif;
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 700;
  line-height: 1.1;
  color: var(--text);
}
.header-left h1 span {
  background: linear-gradient(135deg, var(--pink-deep), var(--lav-deep));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-left p {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.3px;
}
.header-stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.stat-chip {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
}
.stat-chip .num {
  font-family: 'Kaisei Opti', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.stat-chip .label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* ── CONTROLS BAR ── */
.controls {
  position: sticky; top: 0; z-index: 20;
  background: rgba(247,244,239,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 340px;
}
.search-wrap svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 10px 12px 10px 38px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#searchInput:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(249,196,206,0.3);
}
#searchInput::placeholder { color: var(--text-dim); }

.filter-scroll {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.chip {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--surface);
  color: var(--text-dim);
  border-color: var(--border);
}
.chip:hover { border-color: #ccc; color: var(--text); }
.chip.active {
  color: var(--text);
  border-color: transparent;
}
/* subject chips */
.chip[data-subject="all"].active    { background: var(--text); color: #fff; }
.chip[data-subject="english"].active  { background: var(--blue); border-color: var(--blue-deep); color: var(--blue-deep); }
.chip[data-subject="japanese"].active { background: var(--mint); border-color: var(--mint-deep); color: var(--mint-deep); }
.chip[data-subject="general"].active  { background: var(--peach); border-color: var(--peach-deep); color: var(--peach-deep); }
.chip[data-subject="wgl"].active      { background: var(--lav); border-color: var(--lav-deep); color: var(--lav-deep); }
/* type chips */
.chip[data-type="all"].active      { background: var(--text); color: #fff; }
.chip[data-type="grammar"].active    { background: var(--pink); border-color: var(--pink-deep); color: var(--pink-deep); }
.chip[data-type="vocabulary"].active { background: var(--blue); border-color: var(--blue-deep); color: var(--blue-deep); }
.chip[data-type="quiz"].active       { background: var(--mint); border-color: var(--mint-deep); color: var(--mint-deep); }
.chip[data-type="notes"].active      { background: var(--peach); border-color: var(--peach-deep); color: var(--peach-deep); }
.chip[data-type="reference"].active  { background: var(--lav); border-color: var(--lav-deep); color: var(--lav-deep); }
/* course chips */
.chip[data-course="all"].active { background: var(--text); color: #fff; }
.chip[data-course].active       { background: var(--yellow); border-color: var(--peach-deep); color: var(--peach-deep); }

.utility-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 800;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.18s;
}
.utility-btn:hover { border-color: #ccc; color: var(--text); }

.divider { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

/* ── MAIN LAYOUT ── */
.layout {
  position: relative;
  z-index: 5;
  display: flex;
  padding-bottom: 40px;
}

/* ── MAIN LAYOUT ── */
.layout {
  position: relative; z-index: 5;
  padding: 24px 32px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

.results-info {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;

  align-items: start;
  align-content: start;
}

.material-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  display: block;
  text-decoration: none;
  color: inherit;
  align-self: start;
  height: auto;
}
.material-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 16px 16px 0 0;
}
.material-card[data-subject="english"]::before  { background: var(--blue); }
.material-card[data-subject="japanese"]::before { background: var(--mint); }
.material-card[data-subject="general"]::before  { background: var(--peach); }
.material-card[data-subject="wgl"]::before      { background: var(--lav); }

.material-card:hover {
  border-color: #c8c0d8;
  box-shadow: 0 8px 24px var(--shadow);
  transform: translateY(-4px);
}

/* open-link icon, appears on hover */
.card-arrow {
  position: absolute;
  top: 48px; right: 16px;
  opacity: 0;
  transition: opacity 0.18s;
  color: var(--text-dim);
}
.material-card:hover .card-arrow { opacity: 1; }

.edit-tags-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 2;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(255,255,255,0.92);
  color: var(--text-dim);
  padding: 4px 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 2px 8px var(--shadow);
}
.edit-tags-btn:hover,
.edit-tags-btn:focus {
  color: var(--text);
  border-color: #ccc;
}

.card-tags {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  padding-right: 48px;
  flex-wrap: wrap;
}
.tag {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 6px;
}
.tag-subject-english  { background: var(--blue);  color: var(--blue-deep); }
.tag-subject-japanese { background: var(--mint);  color: var(--mint-deep); }
.tag-subject-general  { background: var(--peach); color: var(--peach-deep); }
.tag-subject-wgl      { background: var(--lav);   color: var(--lav-deep); }
.tag-type-grammar     { background: var(--pink);  color: var(--pink-deep); }
.tag-type-vocabulary  { background: #d8eeff;      color: var(--blue-deep); }
.tag-type-quiz        { background: #c8f0d8;      color: var(--mint-deep); }
.tag-type-notes       { background: var(--peach); color: var(--peach-deep); }
.tag-type-reference   { background: var(--lav);   color: var(--lav-deep); }
.tag-course           { background: var(--yellow); color: var(--peach-deep); text-transform: none; }
.tag-local            { background: #f3edf8; color: var(--lav-deep); text-transform: none; }

.card-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.35;
}
.card-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 4px;
}
.card-date {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: #bbb;
}

/* ── TAG EDITOR ── */
.tag-editor-backdrop {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: rgba(46,42,53,0.28);
  backdrop-filter: blur(4px);
}
.tag-editor-backdrop.open { display: flex; }
.tag-editor-panel {
  width: min(420px, 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  background: var(--surface);
  box-shadow: 0 18px 48px rgba(80,60,100,0.22);
  padding: 20px;
}
.tag-editor-panel h2 {
  font-family: 'Kaisei Opti', serif;
  font-size: 22px;
  line-height: 1.25;
  margin-bottom: 6px;
}
.tag-editor-subtitle {
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 16px;
}
.tag-editor-field {
  display: grid;
  gap: 6px;
  margin-bottom: 12px;
}
.tag-editor-field label {
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.tag-editor-field select,
.tag-editor-field input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  background: var(--surface);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  outline: none;
}
.tag-editor-field select:focus,
.tag-editor-field input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(249,196,206,0.25);
}
.tag-editor-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.tag-editor-actions button {
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 8px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  background: var(--surface);
  color: var(--text-dim);
}
.tag-editor-actions button:hover { color: var(--text); border-color: #ccc; }
#saveTagButton { background: var(--text); color: #fff; border-color: var(--text); }
#resetTagButton { margin-right: auto; color: var(--lav-deep); }

/* ── RESPONSIVE ── */
@media (max-width: 720px) {
  header { padding: 28px 20px 20px; }
  .controls {
    padding: 12px 16px;
    flex-direction: column;
    align-items: stretch;
    flex-wrap: nowrap;
  }
  .search-wrap { max-width: none; width: 100%; }
  .controls > .divider { display: none; }
  .filter-scroll {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 10px;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-scroll .filter-group {
    flex-wrap: nowrap;
    flex-shrink: 0;
  }
  .filter-scroll .divider { display: none; }
  .filter-label { flex-shrink: 0; }
  .chip, .utility-btn { flex-shrink: 0; }
  .layout { padding: 20px 16px 40px; }
  .card-grid { grid-template-columns: 1fr; }
  .tag-editor-panel { padding: 18px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <h1>Zoe's <span>Study Archive</span></h1>
  </div>
  <div class="header-stats">
    <div class="stat-chip">
      <span class="num" id="totalCount">—</span>
      <span class="label">资料总数</span>
    </div>
    <div class="stat-chip">
      <span class="num" id="subjectCount">—</span>
      <span class="label">科目</span>
    </div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <!-- Search -->
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="搜索资料名称或描述…">
  </div>

  <div class="divider"></div>

  <div class="filter-scroll">
    <!-- Subject filter -->
    <div class="filter-group">
      <span class="filter-label">科目</span>
      <button class="chip active" data-subject="all">全部</button>
      <button class="chip" data-subject="english">🇬🇧 英语</button>
      <button class="chip" data-subject="japanese">🇯🇵 日语</button>
      <button class="chip" data-subject="general">📚 通识</button>
      <button class="chip" data-subject="wgl">🌐 WGL</button>
    </div>

    <div class="divider"></div>

    <!-- Type filter -->
    <div class="filter-group">
      <span class="filter-label">类型</span>
      <button class="chip active" data-type="all">全部</button>
      <button class="chip" data-type="grammar">文法</button>
      <button class="chip" data-type="vocabulary">词汇</button>
      <button class="chip" data-type="quiz">练习</button>
      <button class="chip" data-type="notes">笔记</button>
      <button class="chip" data-type="reference">参考</button>
    </div>

    <div class="divider"></div>

    <!-- Course filter -->
    <div class="filter-group" id="courseFilter">
      <span class="filter-label">课程</span>
      <button class="chip active" data-course="all">全部</button>
    </div>

    <div class="divider"></div>

    <!-- Local data tools -->
    <div class="filter-group">
      <span class="filter-label">数据</span>
      <button type="button" class="utility-btn" id="exportDataButton">导出</button>
      <button type="button" class="utility-btn" id="importDataButton">导入</button>
      <input type="file" id="importDataInput" accept="application/json,.json" hidden>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">
  <div class="results-info" id="resultsInfo">载入中…</div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<!-- TAG EDITOR -->
<div class="tag-editor-backdrop" id="tagEditor" aria-hidden="true">
  <form class="tag-editor-panel" id="tagEditorForm" role="dialog" aria-modal="true" aria-labelledby="tagEditorTitle">
    <h2 id="tagEditorTitle">编辑资料</h2>
    <p class="tag-editor-subtitle" id="tagEditorMaterialTitle"></p>

    <div class="tag-editor-field">
      <label for="editTitleInput">名称</label>
      <input id="editTitleInput" placeholder="显示在卡片上的名称">
    </div>

    <div class="tag-editor-field">
      <label for="editSubjectSelect">科目</label>
      <select id="editSubjectSelect">
        <option value="english">🇬🇧 英语</option>
        <option value="japanese">🇯🇵 日语</option>
        <option value="general">📚 通识</option>
        <option value="wgl">🌐 WGL</option>
      </select>
    </div>

    <div class="tag-editor-field">
      <label for="editTypeSelect">类型</label>
      <select id="editTypeSelect">
        <option value="grammar">文法</option>
        <option value="vocabulary">词汇</option>
        <option value="quiz">练习</option>
        <option value="notes">笔记</option>
        <option value="reference">参考</option>
      </select>
    </div>

    <div class="tag-editor-field">
      <label for="editCourseInput">课程</label>
      <input id="editCourseInput" list="courseOptions" placeholder="例如 Reading / TOEIC / JLPT">
      <datalist id="courseOptions"></datalist>
    </div>

    <div class="tag-editor-actions">
      <button type="button" id="resetTagButton">恢复自动</button>
      <button type="button" id="cancelTagButton">取消</button>
      <button type="submit" id="saveTagButton">保存</button>
    </div>
  </form>
</div>

<script>

// ── GitHub auto scan settings ──
// Public GitHub repository: https://github.com/starseaship/learnlist
const GITHUB_OWNER = 'starseaship';
const GITHUB_REPO  = 'learnlist';
const GITHUB_BRANCH = 'main';
const MATERIALS_ROOT = 'materials';
const COURSE_FALLBACK_LABEL = '未分类';
const LOCAL_TAG_STORAGE_KEY = 'zoeStudyArchiveTagOverrides:v1';

const SUBJECT_LABELS = {
  english:  '🇬🇧 英语',
  japanese: '🇯🇵 日语',
  general:  '📚 通识',
  wgl:      '🌐 WGL',
};
const TYPE_LABELS = {
  grammar:    '文法',
  vocabulary: '词汇',
  quiz:       '练习',
  notes:      '笔记',
  reference:  '参考',
};

let allMaterials = [];
let activeSubject = 'all';
let activeType = 'all';
let activeCourse = 'all';
let searchQuery = '';
let tagOverrides = loadTagOverrides();
let editingMaterialId = '';

const cardGrid    = document.getElementById('cardGrid');
const resultsInfo = document.getElementById('resultsInfo');
const totalCount  = document.getElementById('totalCount');
const subjectCount = document.getElementById('subjectCount');
const searchInput = document.getElementById('searchInput');
const courseFilter = document.getElementById('courseFilter');
const tagEditor = document.getElementById('tagEditor');
const tagEditorForm = document.getElementById('tagEditorForm');
const tagEditorMaterialTitle = document.getElementById('tagEditorMaterialTitle');
const editTitleInput = document.getElementById('editTitleInput');
const editSubjectSelect = document.getElementById('editSubjectSelect');
const editTypeSelect = document.getElementById('editTypeSelect');
const editCourseInput = document.getElementById('editCourseInput');
const courseOptions = document.getElementById('courseOptions');
const cancelTagButton = document.getElementById('cancelTagButton');
const resetTagButton = document.getElementById('resetTagButton');
const exportDataButton = document.getElementById('exportDataButton');
const importDataButton = document.getElementById('importDataButton');
const importDataInput = document.getElementById('importDataInput');

async function loadMaterials() {
  try {
    resultsInfo.textContent = '正在从 GitHub 读取资料…';
    allMaterials = await scanMaterialsFromTree();

    allMaterials.sort((a, b) => {
      if (a.date && b.date) return new Date(b.date) - new Date(a.date);
      return a.title.localeCompare(b.title, 'zh-CN');
    });

    totalCount.textContent = allMaterials.length;
    subjectCount.textContent = new Set(allMaterials.map(m => m.subject)).size;
    renderCourseFilter();
    render();
  } catch (e) {
    console.error(e);
    resultsInfo.textContent = '⚠ 无法读取 GitHub materials 文件夹';
    cardGrid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;font-size:14px;line-height:1.8;">
        😢 GitHub 读取失败<br>
        <span style="font-family:monospace;font-size:12px;color:#999;">${escHtml(String(e.message || e))}</span><br><br>
        请检查：仓库是否 Public、分支是否 main、materials 文件夹是否存在。
      </div>
    `;
  }
}

async function scanMaterialsFromTree() {
  const treeUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`;
  const res = await fetch(treeUrl, { cache: 'no-store' });

  if (!res.ok) {
    throw new Error(`GitHub Tree API error: ${res.status}. URL: ${treeUrl}`);
  }

  const data = await res.json();
  if (!data.tree || !Array.isArray(data.tree)) {
    throw new Error('GitHub Tree API 返回内容不正常');
  }

  const htmlFiles = data.tree.filter(item =>
    item.type === 'blob' &&
    item.path.startsWith(MATERIALS_ROOT + '/') &&
    item.path.toLowerCase().endsWith('.html')
  );

  if (htmlFiles.length === 0) {
    return [];
  }

  const materials = [];
  for (const item of htmlFiles) {
    materials.push(await makeMaterialItemFromPath(item.path));
  }
  return materials;
}

async function makeMaterialItemFromPath(path) {
  const parts = path.split('/');
  const subject = normalizeSubject(parts[1] || 'general');
  const filename = parts[parts.length - 1];
  const guessedTitle = filename
    .replace(/\.html$/i, '')
    .replace(/[-_]/g, ' ');

  let title = guessedTitle;
  let description = path;
  let type = guessType(filename + ' ' + path);
  let course = guessCourseFromPath(path);
  let date = '';

  try {
    const rawUrl = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}?v=${Date.now()}`;
    const htmlRes = await fetch(rawUrl, { cache: 'no-store' });
    if (htmlRes.ok) {
      const htmlText = await htmlRes.text();
      const doc = new DOMParser().parseFromString(htmlText, 'text/html');

      const htmlTitle = doc.querySelector('title')?.textContent?.trim();
      const htmlDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content')?.trim();
      const htmlType = doc.querySelector('meta[name="type"]')?.getAttribute('content')?.trim();
      const htmlCourse = doc.querySelector('meta[name="course"]')?.getAttribute('content')?.trim();
      const htmlDate = doc.querySelector('meta[name="date"]')?.getAttribute('content')?.trim();

      if (htmlTitle) title = htmlTitle;
      if (htmlDesc) description = htmlDesc;
      if (htmlType) type = normalizeType(htmlType);
      if (htmlCourse) course = normalizeCourse(htmlCourse);
      if (htmlDate) date = htmlDate;
    }
  } catch (e) {
    console.warn('Could not read metadata from', path, e);
  }

  const material = {
    id: path,
    title,
    description,
    subject,
    type,
    course,
    autoTitle: title,
    autoSubject: subject,
    autoType: type,
    autoCourse: course,
    hasLocalTags: false,
    path,
    date
  };

  return applyTagOverride(material);
}

function normalizeTitle(title, fallback = '') {
  const t = String(title || '').trim();
  return t || fallback || '未命名资料';
}

function normalizeSubject(subject) {
  const s = String(subject || '').toLowerCase();
  const allowed = ['english', 'japanese', 'general', 'wgl'];
  return allowed.includes(s) ? s : 'general';
}

function normalizeType(type) {
  const t = String(type || '').toLowerCase();
  const allowed = ['grammar', 'vocabulary', 'quiz', 'notes', 'reference'];
  return allowed.includes(t) ? t : 'reference';
}

function normalizeCourse(course) {
  const c = String(course || '').trim();
  return c || COURSE_FALLBACK_LABEL;
}

function guessCourseFromPath(path) {
  const parts = String(path || '').split('/');
  const courseParts = parts.slice(2, -1).filter(Boolean);
  return normalizeCourse(courseParts.join(' / '));
}

function guessType(text) {
  const name = String(text || '').toLowerCase();

  if (name.includes('grammar') || name.includes('bunpou') || name.includes('文法')) return 'grammar';
  if (name.includes('vocab') || name.includes('word') || name.includes('単語') || name.includes('词汇')) return 'vocabulary';
  if (name.includes('quiz') || name.includes('test') || name.includes('练习')) return 'quiz';
  if (name.includes('note') || name.includes('summary') || name.includes('笔记')) return 'notes';

  return 'reference';
}

function loadTagOverrides() {
  try {
    const parsed = JSON.parse(localStorage.getItem(LOCAL_TAG_STORAGE_KEY) || '{}');
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (e) {
    return {};
  }
}

function saveTagOverrides() {
  localStorage.setItem(LOCAL_TAG_STORAGE_KEY, JSON.stringify(tagOverrides));
}

function applyTagOverride(material) {
  const override = tagOverrides[material.id];
  if (!override) return material;

  material.title = normalizeTitle(override.title, material.autoTitle);
  material.subject = normalizeSubject(override.subject || material.autoSubject);
  material.type = normalizeType(override.type || material.autoType);
  material.course = normalizeCourse(override.course || material.autoCourse);
  material.hasLocalTags = true;
  return material;
}

function resetMaterialToAuto(material) {
  material.title = material.autoTitle;
  material.subject = material.autoSubject;
  material.type = material.autoType;
  material.course = material.autoCourse;
  material.hasLocalTags = false;
}

function refreshMaterialsFromOverrides() {
  allMaterials.forEach(material => {
    resetMaterialToAuto(material);
    applyTagOverride(material);
  });
  renderCourseFilter();
  render();
}

function getFiltered() {
  return allMaterials.filter(m => {
    const matchSubject = activeSubject === 'all' || m.subject === activeSubject;
    const matchType    = activeType === 'all' || m.type === activeType;
    const matchCourse  = activeCourse === 'all' || m.course === activeCourse;
    const q = searchQuery.toLowerCase();
    const matchSearch  = !q ||
      m.title.toLowerCase().includes(q) ||
      (m.description||'').toLowerCase().includes(q) ||
      (m.course||'').toLowerCase().includes(q);
    return matchSubject && matchType && matchCourse && matchSearch;
  });
}

function getCourseList() {
  return [...new Set(allMaterials.map(m => normalizeCourse(m.course)))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
}

function renderCourseFilter() {
  const courses = getCourseList();
  if (activeCourse !== 'all' && !courses.includes(activeCourse)) activeCourse = 'all';

  courseFilter.innerHTML = `
    <span class="filter-label">课程</span>
    <button class="chip ${activeCourse === 'all' ? 'active' : ''}" data-course="all">全部</button>
  `;

  courses.forEach(course => {
    const btn = document.createElement('button');
    btn.className = `chip${course === activeCourse ? ' active' : ''}`;
    btn.dataset.course = course;
    btn.textContent = course;
    courseFilter.appendChild(btn);
  });

  courseFilter.querySelectorAll('.chip[data-course]').forEach(btn => {
    btn.addEventListener('click', () => {
      courseFilter.querySelectorAll('.chip[data-course]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCourse = btn.dataset.course;
      render();
    });
  });
}

function renderCourseOptions(currentCourse) {
  const courses = new Set(getCourseList());
  courses.add(normalizeCourse(currentCourse));
  courseOptions.innerHTML = '';
  [...courses].sort((a, b) => a.localeCompare(b, 'zh-CN')).forEach(course => {
    const option = document.createElement('option');
    option.value = course;
    courseOptions.appendChild(option);
  });
}

function render() {
  const filtered = getFiltered();
  resultsInfo.textContent = `共 ${filtered.length} 份资料`;
  cardGrid.innerHTML = '';

  if (filtered.length === 0) {
    cardGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:#999;font-size:14px;font-weight:700;">🔍 没有找到符合条件的资料</div>`;
    return;
  }

  filtered.forEach((m, i) => {
    const a = document.createElement('a');
    a.className = 'material-card';
    a.href = m.path;
    a.target = '_blank';
    a.rel = 'noopener';
    a.dataset.subject = m.subject;
    a.style.animationDelay = `${i * 0.04}s`;

    a.innerHTML = `
      <button type="button" class="edit-tags-btn" aria-label="编辑资料">编辑</button>
      <svg class="card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      <div class="card-tags">
        <span class="tag tag-subject-${m.subject}">${SUBJECT_LABELS[m.subject]||m.subject}</span>
        <span class="tag tag-type-${m.type}">${TYPE_LABELS[m.type]||m.type}</span>
        <span class="tag tag-course">${escHtml(m.course || COURSE_FALLBACK_LABEL)}</span>
        ${m.hasLocalTags ? '<span class="tag tag-local">自定义</span>' : ''}
      </div>
      <div class="card-title">${escHtml(m.title)}</div>
      <div class="card-desc">${escHtml(m.description||'')}</div>
      <div class="card-date">${m.date}</div>
    `;

    a.querySelector('.edit-tags-btn').addEventListener('click', event => {
      event.preventDefault();
      event.stopPropagation();
      openTagEditor(m.id);
    });

    cardGrid.appendChild(a);
  });
}

function openTagEditor(materialId) {
  const material = allMaterials.find(m => m.id === materialId);
  if (!material) return;

  editingMaterialId = materialId;
  tagEditorMaterialTitle.textContent = material.autoTitle;
  editTitleInput.value = material.title;
  editSubjectSelect.value = material.subject;
  editTypeSelect.value = material.type;
  editCourseInput.value = material.course;
  renderCourseOptions(material.course);
  tagEditor.classList.add('open');
  tagEditor.setAttribute('aria-hidden', 'false');
  setTimeout(() => editTitleInput.focus(), 0);
}

function closeTagEditor() {
  tagEditor.classList.remove('open');
  tagEditor.setAttribute('aria-hidden', 'true');
  editingMaterialId = '';
}

function saveEditedTags() {
  const material = allMaterials.find(m => m.id === editingMaterialId);
  if (!material) return;

  const nextTitle = normalizeTitle(editTitleInput.value, material.autoTitle);
  const nextSubject = normalizeSubject(editSubjectSelect.value);
  const nextType = normalizeType(editTypeSelect.value);
  const nextCourse = normalizeCourse(editCourseInput.value);

  tagOverrides[material.id] = {
    title: nextTitle,
    subject: nextSubject,
    type: nextType,
    course: nextCourse
  };
  saveTagOverrides();

  material.title = nextTitle;
  material.subject = nextSubject;
  material.type = nextType;
  material.course = nextCourse;
  material.hasLocalTags = true;

  renderCourseFilter();
  render();
  closeTagEditor();
}

function resetEditedTags() {
  const material = allMaterials.find(m => m.id === editingMaterialId);
  if (!material) return;

  delete tagOverrides[material.id];
  saveTagOverrides();
  resetMaterialToAuto(material);

  renderCourseFilter();
  render();
  closeTagEditor();
}

function exportEditData() {
  const payload = {
    version: 1,
    source: 'Zoe Study Archive',
    exportedAt: new Date().toISOString(),
    overrides: tagOverrides
  };
  const text = JSON.stringify(payload, null, 2);
  const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  a.href = url;
  a.download = `zoe-study-archive-edits-${date}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function normalizeImportedOverrides(raw) {
  const source = raw && typeof raw === 'object' && raw.overrides && typeof raw.overrides === 'object'
    ? raw.overrides
    : raw;
  if (!source || typeof source !== 'object' || Array.isArray(source)) {
    throw new Error('导入文件格式不正确');
  }

  const normalized = {};
  Object.entries(source).forEach(([id, item]) => {
    if (!id || !item || typeof item !== 'object' || Array.isArray(item)) return;
    normalized[id] = {
      title: String(item.title || '').trim(),
      subject: normalizeSubject(item.subject),
      type: normalizeType(item.type),
      course: normalizeCourse(item.course)
    };
  });

  return normalized;
}

async function importEditDataFromFile(file) {
  if (!file) return;

  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    const imported = normalizeImportedOverrides(parsed);
    const count = Object.keys(imported).length;

    if (count === 0) {
      alert('没有找到可导入的编辑数据。');
      return;
    }

    tagOverrides = {
      ...tagOverrides,
      ...imported
    };
    saveTagOverrides();
    refreshMaterialsFromOverrides();
    alert(`已导入 ${count} 条编辑数据。`);
  } catch (e) {
    alert(`导入失败：${e.message || e}`);
  } finally {
    importDataInput.value = '';
  }
}

document.querySelectorAll('.chip[data-subject]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-subject]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSubject = btn.dataset.subject;
    render();
  });
});

document.querySelectorAll('.chip[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    render();
  });
});

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  render();
});

tagEditorForm.addEventListener('submit', event => {
  event.preventDefault();
  saveEditedTags();
});

cancelTagButton.addEventListener('click', closeTagEditor);
resetTagButton.addEventListener('click', resetEditedTags);
exportDataButton.addEventListener('click', exportEditData);
importDataButton.addEventListener('click', () => importDataInput.click());
importDataInput.addEventListener('change', () => importEditDataFromFile(importDataInput.files[0]));

tagEditor.addEventListener('click', event => {
  if (event.target === tagEditor) closeTagEditor();
});

document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && tagEditor.classList.contains('open')) closeTagEditor();
});

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadMaterials();
</script>
