<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇整理 · Vocabulary Compendium</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600&display=swap');

  :root{
    --cream:#faf6ee;
    --parchment:#f3ecdc;
    --ink:#3a3226;
    --sage:#7c9070;
    --sage-dark:#5d7052;
    --plum:#8a5a72;
    --rose:#b56464;
    --gold:#c9a24b;
    --gold-light:#fdf2c9;
    --line:#e3d8bd;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'EB Garamond', 'Noto Serif SC', serif;
    line-height:1.6;
    padding:0 0 70px;
  }
  .hero{
    text-align:center;
    padding:36px 24px 26px;
  }
  .hero .jp-small{
    color:var(--rose);
    font-size:1.05em;
    letter-spacing:2px;
    margin-bottom:6px;
    font-style:italic;
  }
  .hero h1{
    font-size:2em;
    font-weight:700;
    margin:4px 0 10px;
  }
  .hero .sub{
    font-style:italic;
    color:#8a7f66;
    font-size:1em;
  }
  .divider{
    width:220px;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    margin:22px auto 0;
  }

  .tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:28px auto 8px;
    flex-wrap:wrap;
    padding:0 16px;
  }
  .tab-pill{
    font-family:'EB Garamond', serif;
    font-size:1.05em;
    padding:12px 26px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    background:var(--parchment);
    color:#8a7f66;
    transition:all 0.2s ease;
  }
  .tab-pill.active{
    background:var(--sage);
    color:#fdf9ec;
    font-weight:600;
  }
  .tab-pill:hover:not(.active){ background:#ece2c9; }

  main{
    max-width:860px;
    margin:0 auto;
    padding:0 20px;
  }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .panel-title{
    text-align:center;
    margin:26px 0 18px;
    font-size:1.25em;
  }
  .panel-title .count{ color:#a89a7c; font-size:0.8em; }

  /* Accordion */
  .unit{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .unit-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    cursor:pointer;
    background:var(--parchment);
  }
  .unit-head .title{
    font-weight:600;
    font-size:1.15em;
    color:var(--sage-dark);
  }
  .unit-head .meta{
    color:#a89a7c;
    font-size:0.85em;
    font-style:italic;
  }
  .unit-head .chevron{
    transition:transform 0.25s ease;
    color:var(--gold);
    font-size:1.1em;
  }
  .unit.open .chevron{ transform:rotate(180deg); }
  .unit-body{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.3s ease;
  }
  .unit.open .unit-body{ max-height:6000px; }

  .word-list{
    display:grid;
    gap:12px;
    padding:16px 20px 20px;
  }
  .word-card{
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 16px;
    background:var(--cream);
  }
  .word-card .num{
    color:var(--gold);
    font-weight:600;
    font-size:0.85em;
  }
  .word-card .headword-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  .word-card .headword{
    font-size:1.25em;
    font-weight:700;
  }
  .word-card .zh{
    color:#9a8f74;
    font-family:'Noto Serif SC', serif;
    font-size:0.92em;
  }
  .word-card .def{
    margin-top:4px;
    font-size:1em;
  }
  .word-card .def mark{
    background:var(--gold-light);
    font-weight:700;
    padding:1px 4px;
    border-radius:5px;
    color:inherit;
  }

  /* Matching panel */
  .scope-box{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:22px;
  }
  .scope-box .scope-title{
    font-weight:600;
    color:var(--plum);
    margin-bottom:10px;
    text-align:center;
  }
  .scope-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  .scope-chip{
    font-family:'EB Garamond', serif;
    font-size:0.92em;
    padding:8px 16px;
    border-radius:999px;
    border:1.5px solid var(--line);
    cursor:pointer;
    background:#fff;
    color:#6b5f4a;
    transition:all 0.2s ease;
  }
  .scope-chip.active{
    background:var(--plum);
    border-color:var(--plum);
    color:#fff;
  }
  .scope-actions{
    text-align:center;
    margin-top:14px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .scope-actions button{
    font-family:inherit;
    background:var(--sage);
    color:#fff;
    border:none;
    padding:8px 18px;
    border-radius:999px;
    font-size:0.9em;
    cursor:pointer;
  }
  .scope-actions button.secondary{
    background:var(--parchment);
    color:#6b5f4a;
  }
  .scope-hint{
    text-align:center;
    color:#a89a7c;
    font-size:0.85em;
    font-style:italic;
    margin-top:10px;
  }

  #matchGame{
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .match-col{
    flex:1;
    min-width:260px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .match-item{
    background:#fff;
    border:2px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    cursor:pointer;
    transition:all 0.25s ease;
    font-size:0.96em;
    user-select:none;
  }
  .match-item.word{
    font-weight:700;
    color:var(--sage-dark);
    text-align:center;
  }
  .match-item.def{ color:var(--ink); }
  .match-item:hover{ border-color:var(--gold); }
  .match-item.selected{
    border-color:var(--plum);
    background:#f6ecf1;
  }
  .match-item.matched{
    background:var(--gold-light);
    border-color:var(--sage);
    color:#8a8370;
    opacity:0.5;
    transform:translateY(6px) scale(0.97);
    cursor:default;
    pointer-events:none;
  }
  .match-item.wrong{
    animation:shake 0.4s;
    border-color:#c0574f;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    75%{transform:translateX(5px);}
  }
  #matchStatus{
    text-align:center;
    margin-top:20px;
    font-size:1.1em;
    color:var(--sage-dark);
    font-weight:600;
    min-height:1.4em;
  }
  .controls{ text-align:center; margin-top:20px; }
  button.reset{
    font-family:inherit;
    background:var(--sage);
    color:#fff;
    border:none;
    padding:11px 26px;
    border-radius:999px;
    font-size:1em;
    cursor:pointer;
  }
  button.reset:hover{ background:var(--sage-dark); }

  footer{
    text-align:center;
    margin-top:50px;
    color:#a89a7c;
    font-style:italic;
    font-size:0.9em;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="jp-small">小さな単語の庭</div>
  <h1>词汇整理 · Vocabulary Compendium</h1>

  <div class="divider"></div>
</div>

<div class="tabs">

  <button class="tab-pill" data-tab="match">配对练习</button>
</div>

<main>

  </section>

  <section class="panel" id="panel-match">

    <div class="scope-box">
      <div class="scope-title">选择要练习的单元（可多选）</div>
      <div class="scope-grid" id="scopeGrid"></div>
      <div class="scope-actions">
        <button id="selectAllBtn">全选</button>
        <button class="secondary" id="clearBtn">清除</button>
      </div>
      <div class="scope-hint">建议一次选择 1–3 个单元，配对体验更佳</div>
    </div>
    <div id="matchGame">
      <div class="match-col" id="wordCol"></div>
      <div class="match-col" id="defCol"></div>
    </div>
    <div id="matchStatus"></div>
    <div class="controls">
      <button class="reset" id="resetBtn">Reset &amp; Reshuffle</button>
    </div>
  </section>

</main>

<footer>词汇整理 · Vocabulary Summary + PV/SF 2.8</footer>

// ---------- Render accordion (browse panel) ----------
const accordionEl = document.getElementById('unitAccordion');
units.forEach(u => {
  const unitEl = document.createElement('div');
  unitEl.className = 'unit';

  const head = document.createElement('div');
  head.className = 'unit-head';
  head.innerHTML = `
    <span class="title">${u.title}</span>
    <span class="meta">${u.words.length} words</span>
    <span class="chevron">▾</span>
  `;
  head.addEventListener('click', () => unitEl.classList.toggle('open'));

  const body = document.createElement('div');
  body.className = 'unit-body';
  const list = document.createElement('div');
  list.className = 'word-list';
  u.words.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.innerHTML = `
      <div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="headword-row">
        <span class="headword">${w.en}</span>
        ${w.zh ? `<span class="zh">${w.zh}</span>` : ''}
      </div>
      <div class="def">${w.def}</div>
    `;
    list.appendChild(card);
  });
  body.appendChild(list);

  unitEl.appendChild(head);
  unitEl.appendChild(body);
  accordionEl.appendChild(unitEl);
});

// ---------- Tabs ----------
document.querySelectorAll('.tab-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ---------- Matching scope selector ----------
const scopeGrid = document.getElementById('scopeGrid');
const selectedUnits = new Set([units[0].id]); // default first unit selected

units.forEach(u => {
  const chip = document.createElement('div');
  chip.className = 'scope-chip' + (selectedUnits.has(u.id) ? ' active' : '');
  chip.textContent = u.title;
  chip.dataset.id = u.id;
  chip.addEventListener('click', () => {
    if(selectedUnits.has(u.id)){
      selectedUnits.delete(u.id);
      chip.classList.remove('active');
    } else {
      selectedUnits.add(u.id);
      chip.classList.add('active');
    }
    buildGame();
  });
  scopeGrid.appendChild(chip);
});

document.getElementById('selectAllBtn').addEventListener('click', () => {
  units.forEach(u => selectedUnits.add(u.id));
  document.querySelectorAll('.scope-chip').forEach(c => c.classList.add('active'));
  buildGame();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  selectedUnits.clear();
  document.querySelectorAll('.scope-chip').forEach(c => c.classList.remove('active'));
  buildGame();
});

// ---------- Matching game ----------
let selectedWord = null;
let selectedDef = null;
let matchedCount = 0;
let activeWords = [];

function stripMark(html){ return html.replace(/<\/?mark>/g, ''); }

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getScopeWords(){
  let list = [];
  units.forEach(u => {
    if(selectedUnits.has(u.id)){
      u.words.forEach((w, idx) => list.push({id: u.id + '-' + idx, en: w.en, def: w.def}));
    }
  });
  return list;
}

function buildGame(){
  activeWords = getScopeWords();
  matchedCount = 0;
  selectedWord = null;
  selectedDef = null;
  const statusEl = document.getElementById('matchStatus');
  const wordCol = document.getElementById('wordCol');
  const defCol = document.getElementById('defCol');
  wordCol.innerHTML = '';
  defCol.innerHTML = '';

  if(activeWords.length === 0){
    statusEl.textContent = '请先选择至少一个单元';
    return;
  }
  statusEl.textContent = '';

  const shuffledWords = shuffle(activeWords);
  const shuffledDefs = shuffle(activeWords);

  shuffledWords.forEach(w => {
    const el = document.createElement('div');
    el.className = 'match-item word';
    el.textContent = w.en;
    el.dataset.id = w.id;
    el.addEventListener('click', () => handleWordClick(el, w));
    wordCol.appendChild(el);
  });

  shuffledDefs.forEach(w => {
    const el = document.createElement('div');
    el.className = 'match-item def';
    el.textContent = stripMark(w.def);
    el.dataset.id = w.id;
    el.addEventListener('click', () => handleDefClick(el, w));
    defCol.appendChild(el);
  });
}

function handleWordClick(el, w){
  if(el.classList.contains('matched')) return;
  if(selectedWord) selectedWord.el.classList.remove('selected');
  selectedWord = {el, id: w.id};
  el.classList.add('selected');
  tryMatch();
}
function handleDefClick(el, w){
  if(el.classList.contains('matched')) return;
  if(selectedDef) selectedDef.el.classList.remove('selected');
  selectedDef = {el, id: w.id};
  el.classList.add('selected');
  tryMatch();
}
function tryMatch(){
  if(!selectedWord || !selectedDef) return;
  if(selectedWord.id === selectedDef.id){
    selectedWord.el.classList.remove('selected');
    selectedDef.el.classList.remove('selected');
    selectedWord.el.classList.add('matched');
    selectedDef.el.classList.add('matched');
    matchedCount++;
    selectedWord = null;
    selectedDef = null;
    if(matchedCount === activeWords.length){
      document.getElementById('matchStatus').textContent = '🎉 All matched! Great job!';
    }
  } else {
    const w = selectedWord.el, d = selectedDef.el;
    w.classList.add('wrong');
    d.classList.add('wrong');
    setTimeout(() => {
      w.classList.remove('wrong','selected');
      d.classList.remove('wrong','selected');
      selectedWord = null;
      selectedDef = null;
    }, 400);
  }
}

document.getElementById('resetBtn').addEventListener('click', buildGame);

// init
buildGame();
</script>
